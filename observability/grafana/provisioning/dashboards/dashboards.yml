apiVersion: 1

providers:
  - name: FinFlow Dashboards
    orgId: 1
    folder: FinFlow
    folderUid: finflow
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
