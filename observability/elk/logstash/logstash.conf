# Logstash pipeline for FinFlow centralized logging
# Receives logs from all services, parses JSON, sends to Elasticsearch

input {
  # Receive logs via TCP from services (Logback TCP appender)
  tcp {
    port => 5000
    codec => json_lines
  }
  
  # Alternative: receive from file beats (for Docker log files)
  beats {
    port => 5044
  }
}

filter {
  # Parse the JSON log message if it's a string
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Extract fields from Spring Boot JSON logs
  if [parsed] {
    mutate {
      add_field => {
        "service_name"   => "%{[parsed][service_name]}"
        "trace_id"       => "%{[parsed][traceId]}"
        "span_id"        => "%{[parsed][spanId]}"
        "correlation_id" => "%{[parsed][correlationId]}"
        "level"          => "%{[parsed][level]}"
        "log_message"    => "%{[parsed][message]}"
      }
    }
  }

  # Add environment tag
  mutate {
    add_tag => ["finflow", "local"]
    add_field => { "environment" => "local" }
  }

  # Drop health check logs to reduce noise
  if [log_message] =~ /actuator\/health/ {
    drop { }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "finflow-logs-%{+YYYY.MM.dd}"
    
    # Template for index mapping
    template_name => "finflow-logs"
    template_overwrite => true
  }
  
  # Print to stdout for debugging (comment out in production)
  stdout {
    codec => rubydebug
  }
}
