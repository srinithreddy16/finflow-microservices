name: FinFlow CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  GRADLE_OPTS: '-Xmx4g -XX:+UseG1GC'

jobs:

  build-and-test:
    name: Build and Test All Modules
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Build common and proto modules
        run: ./gradlew :common:build :proto:build --no-daemon

      - name: Build API Gateway
        run: ./gradlew :api-gateway:build --no-daemon

      - name: Build Account Service
        run: ./gradlew :account-service:build --no-daemon

      - name: Build Transaction Service
        run: ./gradlew :transaction-service:build --no-daemon

      - name: Build Payment Service
        run: ./gradlew :payment-service:build --no-daemon

      - name: Build Saga Orchestrator Service
        run: ./gradlew :saga-orchestrator-service:build --no-daemon

      - name: Build Fraud Detection Service
        run: ./gradlew :fraud-detection-service:build --no-daemon

      - name: Build Notification Service
        run: ./gradlew :notification-service:build --no-daemon

      - name: Build Analytics Service
        run: ./gradlew :analytics-service:build --no-daemon

      - name: Build GraphQL Gateway
        run: ./gradlew :graphql-gateway:build --no-daemon

      - name: Build Report Service
        run: ./gradlew :report-service:build --no-daemon

      - name: Run all unit tests
        run: ./gradlew test --no-daemon --continue
        env:
          SPRING_PROFILES_ACTIVE: test
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

      - name: Check code coverage
        run: ./gradlew jacocoTestReport --no-daemon
        continue-on-error: true

      - name: Build Docker images (verify Dockerfiles)
        run: |
          docker build -t finflow/api-gateway:ci \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -f api-gateway/Dockerfile .
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Check for dependency updates
        run: ./gradlew dependencyUpdates --no-daemon
        continue-on-error: true
