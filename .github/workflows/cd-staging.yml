name: FinFlow CD — Staging

on:
  push:
    branches: [develop]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: finflow-cluster-staging
  ENVIRONMENT: staging

jobs:

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all services (skip tests — already passed in CI)
        run: ./gradlew bootJar -x test --no-daemon --parallel

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: |
          echo "TAG=staging-$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push all service images
        run: |
          SERVICES=(
            "api-gateway:8080"
            "graphql-gateway:8081"
            "account-service:8082"
            "transaction-service:8083"
            "payment-service:8084"
            "saga-orchestrator-service:8085"
            "fraud-detection-service:8086"
            "notification-service:8087"
            "analytics-service:8088"
            "report-service:8089"
          )
          
          TAG=${{ steps.image-tag.outputs.TAG }}
          
          for SERVICE_PORT in "${SERVICES[@]}"; do
            SERVICE="${SERVICE_PORT%%:*}"
            docker build \
              -t $ECR_REGISTRY/finflow/$SERVICE:$TAG \
              -t $ECR_REGISTRY/finflow/$SERVICE:staging-latest \
              --label "git-commit=$GITHUB_SHA" \
              --label "build-time=${{ steps.image-tag.outputs.BUILD_TIME }}" \
              -f $SERVICE/Dockerfile .
            
            docker push $ECR_REGISTRY/finflow/$SERVICE:$TAG
            docker push $ECR_REGISTRY/finflow/$SERVICE:staging-latest
            
            echo "✅ Pushed $SERVICE:$TAG"
          done

      - name: Save image tag for next job
        run: echo "${{ steps.image-tag.outputs.TAG }}" > image-tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt

  deploy-staging:
    name: Deploy to Staging ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image tag
        uses: actions/download-artifact@v4
        with:
          name: image-tag

      - name: Set image tag
        id: tag
        run: echo "TAG=$(cat image-tag.txt)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy all services to ECS staging
        run: |
          SERVICES=(
            "api-gateway"
            "graphql-gateway"
            "account-service"
            "transaction-service"
            "payment-service"
            "saga-orchestrator-service"
            "fraud-detection-service"
            "notification-service"
            "analytics-service"
            "report-service"
          )
          
          TAG=${{ steps.tag.outputs.TAG }}
          
          for SERVICE in "${SERVICES[@]}"; do
            echo "Deploying $SERVICE to staging..."
            
            # Get current task definition
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition finflow-$SERVICE-staging \
              --query 'taskDefinition' \
              --output json)
            
            # Update image in task definition
            NEW_TASK_DEF=$(echo $TASK_DEF | \
              jq --arg IMAGE "$ECR_REGISTRY/finflow/$SERVICE:$TAG" \
              '.containerDefinitions[0].image = $IMAGE |
               del(.taskDefinitionArn, .revision, .status,
                   .requiresAttributes, .placementConstraints,
                   .compatibilities, .registeredAt, .registeredBy)')
            
            # Register new task definition revision
            NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)
            
            # Update ECS service
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service finflow-$SERVICE-staging \
              --task-definition $NEW_TASK_DEF_ARN \
              --force-new-deployment
            
            echo "✅ $SERVICE deployment initiated"
          done

      - name: Wait for all services to stabilize
        run: |
          SERVICES=(
            "api-gateway" "graphql-gateway" "account-service"
            "transaction-service" "payment-service"
          )
          
          for SERVICE in "${SERVICES[@]}"; do
            echo "Waiting for $SERVICE..."
            aws ecs wait services-stable \
              --cluster $ECS_CLUSTER \
              --services finflow-$SERVICE-staging
            echo "✅ $SERVICE is stable"
          done

      - name: Run smoke tests against staging
        run: |
          STAGING_URL="https://api-staging.finflow.io"
          
          echo "Running smoke tests against $STAGING_URL..."
          
          # Health check
          curl -f $STAGING_URL/actuator/health || \
            (echo "❌ Health check failed" && exit 1)
          
          echo "✅ Smoke tests passed"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Staging deployment successful!"
          echo "Image tag: ${{ steps.tag.outputs.TAG }}"
          echo "Services deployed: 10"
          echo "Environment: staging"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Staging deployment FAILED"
          echo "Check ECS console for details"
