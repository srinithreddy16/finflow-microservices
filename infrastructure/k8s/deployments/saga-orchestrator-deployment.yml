apiVersion: apps/v1
kind: Deployment
metadata:
  name: saga-orchestrator-service
  namespace: finflow
  labels:
    app: saga-orchestrator-service
    version: "1.0.0"
    app.kubernetes.io/part-of: finflow-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saga-orchestrator-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # zero-downtime rolling update
  template:
    metadata:
      labels:
        app: saga-orchestrator-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: finflow-service-account
      terminationGracePeriodSeconds: 30
      containers:
        - name: saga-orchestrator-service
          image: finflow/saga-orchestrator-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
              name: http
          envFrom:
            - configMapRef:
                name: saga-orchestrator-config
          env:
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC --enable-preview"
            - name: SAGA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: SAGA_DB_PASSWORD
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_CLIENT_SECRET
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - saga-orchestrator-service
                topologyKey: kubernetes.io/hostname
