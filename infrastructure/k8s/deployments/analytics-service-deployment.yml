apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: finflow
  labels:
    app: analytics-service
    version: "1.0.0"
    app.kubernetes.io/part-of: finflow-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # zero-downtime rolling update
  template:
    metadata:
      labels:
        app: analytics-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8088"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: finflow-service-account
      terminationGracePeriodSeconds: 30
      containers:
        - name: analytics-service
          image: finflow/analytics-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8088
              name: http
          envFrom:
            - configMapRef:
                name: analytics-service-config
          env:
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC --enable-preview"
            - name: ANALYTICS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: ANALYTICS_DB_PASSWORD
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - analytics-service
                topologyKey: kubernetes.io/hostname
