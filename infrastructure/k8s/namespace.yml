apiVersion: v1
kind: Namespace
metadata:
  name: finflow
  labels:
    app.kubernetes.io/name: finflow
    app.kubernetes.io/part-of: finflow-platform
    environment: production

---
# Resource quota for the namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: finflow-quota
  namespace: finflow
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "20"

---
# Default resource limits for containers that don't specify
apiVersion: v1
kind: LimitRange
metadata:
  name: finflow-limits
  namespace: finflow
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      max:
        cpu: "4"
        memory: 4Gi
      min:
        cpu: 50m
        memory: 64Mi
