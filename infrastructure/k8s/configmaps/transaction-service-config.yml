apiVersion: v1
kind: ConfigMap
metadata:
  name: transaction-service-config
  namespace: finflow
  labels:
    app: transaction-service
    app.kubernetes.io/part-of: finflow-platform
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8083"
  TRANSACTION_DB_URL: "jdbc:postgresql://transaction-db-service:5432/transaction_db"
  TRANSACTION_DB_USERNAME: "finflow"
  FRAUD_SERVICE_HOST: "fraud-detection-service"
  FRAUD_SERVICE_GRPC_PORT: "9001"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USERNAME: "finflow"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  KEYCLOAK_ISSUER_URI: "http://keycloak:9090/realms/finflow"
  KEYCLOAK_JWKS_URI: "http://keycloak:9090/realms/finflow/protocol/openid-connect/certs"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector:4318/v1/traces"
  OTEL_SERVICE_NAME: "transaction-service"
