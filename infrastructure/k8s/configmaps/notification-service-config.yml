apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: finflow
  labels:
    app: notification-service
    app.kubernetes.io/part-of: finflow-platform
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8087"
  NOTIFICATION_DB_URL: "jdbc:postgresql://notification-db-service:5432/notification_db"
  NOTIFICATION_DB_USERNAME: "finflow"
  EMAIL_ENABLED: "true"
  SMS_ENABLED: "false"
  AWS_REGION: "us-east-1"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USERNAME: "finflow"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  KEYCLOAK_ISSUER_URI: "http://keycloak:9090/realms/finflow"
  KEYCLOAK_JWKS_URI: "http://keycloak:9090/realms/finflow/protocol/openid-connect/certs"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector:4318/v1/traces"
  OTEL_SERVICE_NAME: "notification-service"
