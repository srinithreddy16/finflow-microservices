apiVersion: v1
kind: Service
metadata:
  name: graphql-gateway
  namespace: finflow
  labels:
    app: graphql-gateway
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: graphql-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8081
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8081
      protocol: TCP
