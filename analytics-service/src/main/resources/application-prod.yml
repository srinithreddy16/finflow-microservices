spring:
  datasource:
    url: ${ANALYTICS_DB_URL}
    username: ${ANALYTICS_DB_USERNAME}
    password: ${ANALYTICS_DB_PASSWORD}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI}

logging:
  level:
    com.finflow.analytics: INFO
    org.springframework.kafka: WARN

management:
  tracing:
    sampling:
      probability: 0.1
