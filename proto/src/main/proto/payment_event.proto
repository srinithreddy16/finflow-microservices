syntax = "proto3";

package com.finflow.payment;

option java_package = "com.finflow.proto.payment";
option java_outer_classname = "PaymentEventProto";

message PaymentEvent {
  string event_id = 1;
  string payment_id = 2;
  string transaction_id = 3;
  string account_id = 4;
  double amount = 5;
  string currency = 6;
  string event_type = 7;
  string occurred_on = 8;
  string correlation_id = 9;
}
