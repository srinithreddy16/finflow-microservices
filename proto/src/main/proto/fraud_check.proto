syntax = "proto3";

package com.finflow.fraud;

option java_package = "com.finflow.proto.fraud";
option java_outer_classname = "FraudCheckProto";

service FraudCheckService {
  rpc CheckTransaction(FraudCheckRequest) returns (FraudCheckResponse);
}

message FraudCheckRequest {
  string transaction_id = 1;
  string account_id = 2;
  double amount = 3;
  string currency = 4;
  string country_code = 5;
}

message FraudCheckResponse {
  string transaction_id = 1;
  int32 fraud_score = 2;
  bool flagged = 3;
  string reason = 4;
}
